<script>
const validPhone = "7658808743";
const validPassword = "1234";

function login() {
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;

    if(phone === validPhone && password === validPassword) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";

        localStorage.setItem("loggedIn", "true");
    } else {
        document.getElementById("error").innerText = "Invalid credentials!";
    }
}

function logout() {
    localStorage.removeItem("loggedIn");
    location.reload();
}

window.onload = function() {
    if(localStorage.getItem("loggedIn") === "true") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
    }
}
</script>
<script>
let generatedOTP = "";

function sendOTP() {
    let phone = document.getElementById("phone").value;

    if(phone.length !== 10){
        document.getElementById("error").innerText = "Enter valid number!";
        return;
    }

    // Generate fake OTP
    generatedOTP = Math.floor(1000 + Math.random() * 9000);

    alert("OTP: " + generatedOTP); // Demo only

    document.getElementById("phoneStep").style.display = "none";
    document.getElementById("otpStep").style.display = "block";
}

function verifyOTP() {
    let enteredOTP = document.getElementById("otp").value;

    if(enteredOTP == generatedOTP){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";

        localStorage.setItem("loggedIn", "true");
    } else {
        document.getElementById("error").innerText = "Wrong OTP!";
    }
}

function logout() {
    localStorage.removeItem("loggedIn");
    location.reload();
}

window.onload = function() {
    if(localStorage.getItem("loggedIn") === "true") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
    }
}
</script>
